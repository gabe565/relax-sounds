services:
  api:
    image: ghcr.io/gabe565/relax-sounds
    build:
      context: .
      target: api-only
    environment:
      RELAX_VALKEY_ENABLED: "true"
      RELAX_VALKEY_HOST: valkey
    depends_on:
      valkey:
        condition: service_started
    ports:
      - 127.0.0.1:3000:80
    volumes:
      - ./pb_data:/data
    read_only: true
    develop:
      watch:
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: .
          include: "**/*.go"

  frontend:
    image: ghcr.io/gabe565/relax-sounds-frontend
    build:
      context: .
      target: frontend-deps
    command:
      - pnpm
      - run
      - dev
      - --host=0.0.0.0
    environment:
      VITE_API_ADDRESS: http://localhost:3000
    ports:
      - 127.0.0.1:5173:5173
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          include: "package*.json"
        - action: sync
          path: ./frontend
          target: /app

  valkey:
    image: valkey/valkey:9-alpine
    ports:
      - 127.0.0.1:6379:6379
